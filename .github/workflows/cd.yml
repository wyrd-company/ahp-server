name: CD

on:
  push:
    tags:
      - '*.*.*'

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Validate semver tag
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag must be a semver version without a leading v: $tag" >&2
            exit 1
          fi
          version="$(node -p "require('./package.json').version")"
          if [[ "$tag" != "$version" ]]; then
            echo "Tag $tag does not match package.json version $version" >&2
            exit 1
          fi

      - run: npm install
      - run: npm run verify
      - run: npm pack --dry-run

      - name: Publish to npmjs
        run: npm publish --access public --provenance --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@wyrd-company'

      - name: Publish to GitHub Packages
        run: npm publish --registry https://npm.pkg.github.com --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub release
        run: |
          set -euo pipefail
          title="$(node -p "require('./package.json').name + '@' + require('./package.json').version")"
          gh release create "${GITHUB_REF_NAME}" --title "$title" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
