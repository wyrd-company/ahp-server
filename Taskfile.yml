version: '3'

tasks:
  build:
    desc: Compile TypeScript into dist
    cmds:
      - npm run build

  test:
    desc: Run the local Node test suite
    cmds:
      - npm test

  typecheck:
    desc: Typecheck without emitting JavaScript
    cmds:
      - npm run typecheck

  verify:
    desc: Run typecheck, tests, and build
    cmds:
      - npm run verify

  live:pi:
    desc: Run live Pi Agent adapter and packaged process validation
    cmds:
      - scripts/validate-live-pi-agent.sh

  live:claude:
    desc: Run live Claude Agent SDK adapter and packaged process validation
    cmds:
      - scripts/validate-live-claude-agent-sdk.sh

  live:resources:
    desc: Run live packaged resource command validation over NATS
    cmds:
      - scripts/validate-live-resources.sh
