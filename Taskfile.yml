version: '3'

tasks:
  build:
    desc: Compile TypeScript into dist
    cmds:
      - npm run build

  test:
    desc: Run the local Node test suite
    cmds:
      - npm test

  typecheck:
    desc: Typecheck without emitting JavaScript
    cmds:
      - npm run typecheck

  verify:
    desc: Run typecheck, tests, and build
    cmds:
      - npm run verify

  live:vertical:
    desc: Run the live NATS plus Codex App Server vertical-slice validation
    cmds:
      - scripts/validate-live-vertical.sh

  live:process:
    desc: Run the live packaged server-process validation
    cmds:
      - scripts/validate-live-server-process.sh
